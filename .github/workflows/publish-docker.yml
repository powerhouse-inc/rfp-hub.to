name: Publish Docker Image

# Security note: all refs used below are trusted git refs (branches we
# control and tags we push ourselves). No untrusted event payload fields
# (issue bodies, PR titles, etc.) are interpolated into shell scripts —
# see https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  push:
    branches: [main]
    tags: ['v*.*.*', '*-dev.*', '*-staging.*']
  workflow_dispatch:

permissions:
  contents: read

env:
  HARBOR_REGISTRY: cr.vetra.io
  # Namespace provided by the Harbor admin (robot account: robot$rfp-hub+github).
  HARBOR_PROJECT: rfp-hub
  IMAGE_NAME: rfp-hub-to

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)

          TAGS=()
          # Always tag with short sha so rollbacks are deterministic.
          TAGS+=("${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:sha-${SHA_SHORT}")

          if [ "$REF_TYPE" = "tag" ]; then
            TAGS+=("${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${REF_NAME}")
            case "$REF_NAME" in
              *-dev.*)
                TAGS+=("${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:dev") ;;
              *-staging.*)
                TAGS+=("${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:staging") ;;
              v*.*.*|[0-9]*.[0-9]*.[0-9]*)
                TAGS+=("${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:latest") ;;
            esac
          elif [ "$REF_NAME" = "main" ]; then
            TAGS+=("${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:main")
          fi

          {
            echo "tags<<TAGS_EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"
          printf '[tags]\n%s\n' "${TAGS[@]}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # No build-args for NEXT_PUBLIC_* — the app injects runtime env
          # via window.__ENV in app/layout.tsx, so the same image works
          # across dev / staging / prod by setting env vars at container
          # start time.
